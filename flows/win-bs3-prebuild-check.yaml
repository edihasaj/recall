name: win-bs3-prebuild-check
# Goal: prove our CI-built win32-arm64 better_sqlite3.node loads + runs on
# the win11-studio Parallels guest. Seeds the .node manually since no
# tagged release exists yet for prebuild-install to fetch from. Pre-step
# on the host:
#
#   gh run download <run-id> -R edihasaj/recall \
#     -n prebuild-win32-arm64-node24 -D .prebuilds-seed/
workdir: C:\work\recall-clean
steps:
  - name: ship source
    sync: .
  - name: fresh checkout to local drive
    # Clean dir so pnpm runs a real first-time install. /XD excludes
    # node_modules/.git from the mirror but keeps .prebuilds-seed/.
    run: rmdir /S /Q C:\work\recall-clean 2>nul & robocopy %VMLAB_SYNC_DIR% C:\work\recall-clean /MIR /NFL /NDL /NJH /NJS /NC /NS /XD node_modules .git dist-windows webui & exit /b 0
  - name: install deps (skip native gyp build)
    # --ignore-scripts skips better-sqlite3's `prebuild-install || node-gyp`
    # so we can drop our own prebuilt .node in the next step. We've already
    # proved upstream prebuild-install fails (no win32-arm64) and node-gyp
    # fails (no Python on the guest) — that's the whole reason this exists.
    run: '"%APPDATA%\npm\pnpm.cmd" install --no-frozen-lockfile --ignore-scripts --filter=!@edihasaj/recall-webui'
  - name: seed our CI-built win32-arm64 .node
    # tar ships with Windows 10+. -C cds into the better-sqlite3 module
    # dir; the tarball's `build/Release/better_sqlite3.node` lands at
    # node_modules\.pnpm\better-sqlite3@11.10.0\node_modules\better-sqlite3\build\Release\.
    # Hardcoding the version matches the lockfile; bump alongside pnpm-lock.
    run: tar -xzf .prebuilds-seed\better-sqlite3-v11.10.0-node-v137-win32-arm64.tar.gz -C node_modules\.pnpm\better-sqlite3@11.10.0\node_modules\better-sqlite3 build/Release/better_sqlite3.node
  - name: probe binding presence
    run: powershell -NoProfile -Command "$f = Get-ChildItem -Path C:\work\recall-clean\node_modules -Recurse -Filter better_sqlite3.node -ErrorAction SilentlyContinue; if ($f) { Write-Host ('FOUND ' + $f.FullName) } else { Write-Host 'NOT FOUND'; exit 1 }"
  - name: load + insert + select + fts5
    assert: >-
      node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.prepare('CREATE TABLE t(x INT)').run();db.prepare('INSERT INTO t VALUES(42)').run();if(db.prepare('SELECT x FROM t').get().x!==42)throw new Error('roundtrip failed');db.exec('CREATE VIRTUAL TABLE f USING fts5(x, tokenize=porter)');db.exec(\"INSERT INTO f VALUES('hello world')\");const r=db.prepare('SELECT x FROM f WHERE f MATCH ?').all('hello');if(r.length!==1)throw new Error('fts5 failed');console.log('bs3 ok',db.prepare('SELECT sqlite_version() as v').get().v,'fts5 ok');db.close();"
