name: win-bs3-prebuild-check
# Goal: prove out whether better-sqlite3 has a working prebuilt binary for
# the guest's node ABI + arch (win32-arm64, node v24 / ABI 137 here). If
# yes — keep better-sqlite3 and ship the prebuild. If no — that's the
# argument for migrating storage to @libsql/client (drop-in prebuilds for
# every platform).
workdir: C:\work\recall-clean
steps:
  - name: ship source
    sync: .
  - name: fresh checkout to local drive
    # Clean dir so pnpm runs a real first-time install (prebuild-install
    # only runs during the install lifecycle, not on cached node_modules).
    run: rmdir /S /Q C:\work\recall-clean 2>nul & robocopy %VMLAB_SYNC_DIR% C:\work\recall-clean /MIR /NFL /NDL /NJH /NJS /NC /NS /XD node_modules .git dist-windows webui & exit /b 0
  - name: install (let prebuild-install do its thing)
    # No --ignore-scripts so prebuild-install runs and fetches the binary
    # from the better-sqlite3 GitHub release for our node ABI + arch.
    run: '"%APPDATA%\npm\pnpm.cmd" install --no-frozen-lockfile --filter=!@edihasaj/recall-webui'
  - name: probe binding presence
    run: powershell -NoProfile -Command "$f = Get-ChildItem -Path C:\work\recall-clean\node_modules -Recurse -Filter better_sqlite3.node -ErrorAction SilentlyContinue; if ($f) { Write-Host ('FOUND ' + $f.FullName) } else { Write-Host 'NOT FOUND'; exit 1 }"
  - name: try requiring it
    run: cd /d C:\work\recall-clean && node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.exec('create virtual table t using fts5(x, tokenize=porter)'); db.exec(\"insert into t values('hello world')\"); console.log('fts5 porter OK:', db.prepare('select x from t where t match ?').all('hello'));"
