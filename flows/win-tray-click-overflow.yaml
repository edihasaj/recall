name: win-tray-click-overflow
workdir: $VMLAB_SYNC_DIR
steps:
  - sync: .
  - name: schedule overflow-click as interactive user
    # Mouse input requires user-session context; SYSTEM/Session 0 can't
    # synthesize input that the Session 1 desktop sees. So we wrap the PS1
    # in a one-shot scheduled task /ru INTERACTIVE /it, just like the tray
    # itself.
    run: |
      schtasks /create /tn RecallTrayClick /tr "powershell.exe -NoProfile -ExecutionPolicy Bypass -File %VMLAB_SYNC_DIR%\windows\tray\scripts\show-tray-overflow.ps1" /sc once /st 23:59 /ru INTERACTIVE /it /f && schtasks /run /tn RecallTrayClick
