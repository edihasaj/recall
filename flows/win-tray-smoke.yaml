name: win-tray-smoke
workdir: $VMLAB_SYNC_DIR
steps:
  - name: ship source (includes dist-windows/)
    sync: .
  - name: ship binary
    # robocopy the cross-compiled exe to a local drive; UNC works for
    # exec but local drive is what an installer would target.
    run: robocopy %VMLAB_SYNC_DIR%\dist-windows C:\work\recall-tray /MIR /NFL /NDL /NJH /NJS /NC /NS & exit /b 0
  - name: arm64 binary --version
    assert: C:\work\recall-tray\recall-tray-arm64.exe --version
