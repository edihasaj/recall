name: win-smoke
steps:
  - name: ensure pnpm
    install:
      windows: npm install -g pnpm@10
  - name: ship source
    sync: .
  - name: copy to local drive
    # pnpm install fails on UNC shared folders (.pnpm hard-link store needs a
    # real disk). Mirror the shared source to C:\work\recall once per run.
    run: robocopy \\Mac\recall C:\work\recall /MIR /NFL /NDL /NJH /NJS /NC /NS /XD node_modules .git & exit /b 0
  - name: install deps
    # %APPDATA%\npm\pnpm.cmd because `npm install -g` doesn't propagate PATH
    # into subsequent prlctl exec sessions (each exec is a fresh shell).
    run: cd /d C:\work\recall && "%APPDATA%\npm\pnpm.cmd" install --no-frozen-lockfile
  - name: build
    run: cd /d C:\work\recall && "%APPDATA%\npm\pnpm.cmd" build
  - name: cli runs
    assert: cd /d C:\work\recall && node dist\cli.js --version
