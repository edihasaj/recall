name: CI

on:
  push:
    branches: ["*"]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check docs site
        run: npm run docs:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build CLI
        run: npm run build
