name: native-prebuilds

# Build prebuilt better-sqlite3 + sqlite-vec binaries for every (os, arch,
# node-abi) combo recall targets, then upload to a GitHub release so
# `prebuild-install` (which better-sqlite3's postinstall runs by default)
# can fetch them. Without this, win32-arm64 users fall through to a gyp
# build that needs Python + MSVC — the exact reason recall was effectively
# unshippable on Windows ARM.
#
# Triggers: tag push (real release), manual dispatch (dev iteration). The
# job is split into two stages so a failed Windows ARM build doesn't block
# the other artifacts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      node_versions:
        description: "Comma-separated node majors (default: 20,22,24)"
        default: "20,22,24"
        required: false
      dry_run:
        description: "Build but do not upload artifacts to a release"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prebuild:
    name: prebuild ${{ matrix.os }} ${{ matrix.arch }} node${{ matrix.node }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - { os: darwin,  arch: x64,   runner: macos-15-intel,     node: 20 }
          - { os: darwin,  arch: x64,   runner: macos-15-intel,     node: 22 }
          - { os: darwin,  arch: x64,   runner: macos-15-intel,     node: 24 }
          - { os: darwin,  arch: arm64, runner: macos-14,           node: 20 }
          - { os: darwin,  arch: arm64, runner: macos-14,           node: 22 }
          - { os: darwin,  arch: arm64, runner: macos-14,           node: 24 }
          # Linux
          - { os: linux,   arch: x64,   runner: ubuntu-22.04,       node: 20 }
          - { os: linux,   arch: x64,   runner: ubuntu-22.04,       node: 22 }
          - { os: linux,   arch: x64,   runner: ubuntu-22.04,       node: 24 }
          - { os: linux,   arch: arm64, runner: ubuntu-22.04-arm,   node: 20 }
          - { os: linux,   arch: arm64, runner: ubuntu-22.04-arm,   node: 22 }
          - { os: linux,   arch: arm64, runner: ubuntu-22.04-arm,   node: 24 }
          # Windows
          - { os: win32,   arch: x64,   runner: windows-2022,       node: 20 }
          - { os: win32,   arch: x64,   runner: windows-2022,       node: 22 }
          - { os: win32,   arch: x64,   runner: windows-2022,       node: 24 }
          # ← THE one that's missing upstream and bites all our Windows-ARM users.
          - { os: win32,   arch: arm64, runner: windows-11-arm,     node: 20 }
          - { os: win32,   arch: arm64, runner: windows-11-arm,     node: 22 }
          - { os: win32,   arch: arm64, runner: windows-11-arm,     node: 24 }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - name: install (no scripts; we run prebuild manually)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: resolve better-sqlite3 module path
        # GH Actions' `working-directory:` doesn't glob, so pnpm's
        # node_modules/.pnpm/better-sqlite3@<ver>/... path can't be hard-coded.
        # Ask node where it actually lives — works on every OS in the matrix.
        id: bsq
        run: |
          BSQ_DIR=$(node -p "require('path').dirname(require.resolve('better-sqlite3/package.json'))")
          echo "dir=$BSQ_DIR" >> "$GITHUB_OUTPUT"
          echo "Resolved better-sqlite3 at: $BSQ_DIR"
        shell: bash
      - name: build better-sqlite3 native binding (node-gyp)
        # better-sqlite3@11 ships `binary: {}` in its package.json and uses
        # `prebuild-install || node-gyp rebuild` as its install script, i.e.
        # per-ABI native builds (not napi). So we drive node-gyp directly and
        # let the matrix's setup-node ABI pick the right NODE_MODULE_VERSION.
        # Python is preinstalled on every actions/runner image; Windows
        # runners include Visual Studio Build Tools.
        working-directory: ${{ steps.bsq.outputs.dir }}
        run: |
          # node-gyp ships with npm but isn't on PATH; npx finds the bundled
          # copy without an extra `npm i -g node-gyp` round-trip.
          npx --yes node-gyp rebuild --release --arch=${{ matrix.arch }}
          ls -la build/Release/
        shell: bash
      - name: package as prebuild-install tarball
        # prebuild-install fetches tarballs named
        #   <name>-v<version>-<runtime>-v<abi>-<platform>-<arch>.tar.gz
        # where the tar contains build/Release/<addon>.node — mirroring
        # exactly what `prebuild` would have produced. Keeping the format
        # means a future tag push can upload these to the release and
        # better-sqlite3's stock prebuild-install picks them up.
        #
        # Run from $GITHUB_WORKSPACE (default) so the `-f` arg is a relative
        # path. Windows GNU tar parses absolute `C:\...` paths as `host:file`
        # and tries scp; bsdtar (macOS) rejects --force-local, so the only
        # portable workaround is to keep the colon out of -f. `-C <abs path>`
        # is fine because tar treats that arg differently.
        run: |
          NODE_ABI=$(node -p "process.versions.modules")
          # Reading the path via argv avoids `\b` / `\f` etc. being mangled
          # when a Windows `C:\...` path is interpolated into a JS string.
          VERSION=$(node -e "console.log(require(process.argv[1]).version)" "${{ steps.bsq.outputs.dir }}/package.json")
          NAME="better-sqlite3-v${VERSION}-node-v${NODE_ABI}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p prebuilds-out
          tar -czf "prebuilds-out/${NAME}.tar.gz" -C "${{ steps.bsq.outputs.dir }}" build/Release/better_sqlite3.node
          ls -la prebuilds-out/
        shell: bash
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prebuild-${{ matrix.os }}-${{ matrix.arch }}-node${{ matrix.node }}
          path: prebuilds-out/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to edihasaj/recall-prebuilds
    needs: prebuild
    if: ${{ !inputs.dry_run && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - name: resolve better-sqlite3 version
        # The prebuilds repo uses one release per better-sqlite3 version (tag
        # = v<bsq3-version>). prebuild-install constructs URLs as
        # <host>/v<bsq3-version>/<filename>, so the release tag must match.
        id: bsq
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          BSQ_VERSION=$(node -p "require('better-sqlite3/package.json').version")
          echo "version=$BSQ_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved better-sqlite3 version: $BSQ_VERSION"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
      - name: flatten
        run: |
          mkdir -p release/
          find artifacts/ -type f -name "*.tar.gz" -exec cp -v {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
          tag_name: v${{ steps.bsq.outputs.version }}
          repository: edihasaj/recall-prebuilds
          # Requires a fine-grained PAT with contents:write on edihasaj/recall-prebuilds.
          # Set as repo secret RECALL_PREBUILDS_TOKEN; the default GITHUB_TOKEN can't write cross-repo.
          token: ${{ secrets.RECALL_PREBUILDS_TOKEN }}
          fail_on_unmatched_files: true
          # If the release already exists (multiple recall versions can ship
          # the same better-sqlite3 binary), upsert new files; don't error.
          make_latest: 'false'
