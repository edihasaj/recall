name: Auto Release

on:
  push:
    branches: ["main"]
    paths:
      - "CHANGELOG.md"
      - "package.json"
      - "package-lock.json"

permissions:
  actions: write
  contents: write

jobs:
  tag:
    name: Tag package version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect releasable version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json version must be X.Y.Z for automatic releases; got $version"
            exit 1
          fi

          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "$tag already exists; no release needed."
            exit 0
          fi

          if ! grep -Eq "^## ${version}([[:space:]-]|$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must include a '## $version' section before releasing."
            exit 1
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          tag_sha="$(
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/tags" \
              -f tag="$tag" \
              -f message="$tag" \
              -f object="$GITHUB_SHA" \
              -f type=commit \
              --jq '.sha'
          )"
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$tag" \
            -f sha="$tag_sha"

      - name: Dispatch release workflows
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml --field tag="${{ steps.version.outputs.tag }}"
          gh workflow run windows-tray.yml --field tag="${{ steps.version.outputs.tag }}"
