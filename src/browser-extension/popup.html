<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      background: #0f0f23;
      color: #e0e0e0;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      color: #e94560;
      margin: 0 0 12px 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.online { background: #4caf50; }
    .dot.offline { background: #f44336; }
    .dot.checking { background: #ff9800; }
    label {
      display: block;
      margin-bottom: 4px;
      color: #888;
      font-size: 11px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Recall</h1>
  <div class="status">
    <div class="dot checking" id="dot"></div>
    <span id="status-text">Checking daemon...</span>
  </div>
  <label>Default repo</label>
  <input id="repo" type="text" placeholder="owner/repo" />
  <label>Daemon URL</label>
  <input id="daemon-url" type="text" placeholder="http://localhost:7890" />
  <div class="info">
    The content script panel injects into Claude and ChatGPT pages.
    Make sure <code>recall daemon</code> is running.
  </div>
  <script src="popup.js"></script>
</body>
</html>
